version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/koll
    binary: koll
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: viktorfroberg
      name: homebrew-tap
    homepage: "https://github.com/viktorfroberg/koll"
    description: "Real-time git diff viewer for your terminal"
    license: "MIT"
    install: |
      bin.install "koll"
